<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img">
  <title>Evidence-based evolution</title>
  <desc>reflections can propose changes, but promotion requires proof</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8f725b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <radialGradient id="glow" cx="48%" cy="0%" r="95%">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#1d1914" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0d0c0a"/>
    </radialGradient>
    <pattern id="mesh" width="82" height="82" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.6" fill="#8f725b" opacity="0.22"/>
      <path d="M12 12L82 46M12 12L46 82" stroke="#8f725b" stroke-width="0.72" opacity="0.12"/>
    </pattern>
  </defs>
  <rect x="22" y="22" width="956" height="656" rx="20" fill="#1d1914" stroke="#4a3b2f" stroke-width="1.2"/>
  <circle cx="54" cy="50" r="6" fill="#d97757"/>
  <circle cx="76" cy="50" r="6" fill="#e7b16f" opacity="0.72"/>
  <circle cx="98" cy="50" r="6" fill="#aa8f7a" opacity="0.72"/>
  <text x="54" y="88" font-size="26" font-weight="850" fill="#f4efe7">Evidence-based evolution</text>
  <text x="54" y="114" font-size="14" font-weight="540" fill="#b9afa2">reflections can propose changes, but promotion requires proof</text>
  
  <g>
    <rect x="82" y="162" width="222" height="100" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="98" y1="162" x2="288" y2="162" stroke="#e7b16f" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="193" font-size="16" font-weight="820" fill="#f4efe7">Reflection</text>
    <text x="100" y="219" font-size="12.2" font-weight="520" fill="#b9afa2">repeated issue</text>
<text x="100" y="236" font-size="12.2" font-weight="520" fill="#b9afa2">or missing skill</text>
  </g>
  <g>
    <rect x="389" y="162" width="222" height="100" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="405" y1="162" x2="595" y2="162" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
    <text x="407" y="193" font-size="16" font-weight="820" fill="#f4efe7">Proposal</text>
    <text x="407" y="219" font-size="12.2" font-weight="520" fill="#b9afa2">draft behavior</text>
<text x="407" y="236" font-size="12.2" font-weight="520" fill="#b9afa2">or skill update</text>
  </g>
  <g>
    <rect x="696" y="162" width="222" height="100" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="712" y1="162" x2="902" y2="162" stroke="#aa8f7a" stroke-width="3" stroke-linecap="round"/>
    <text x="714" y="193" font-size="16" font-weight="820" fill="#f4efe7">Baseline set</text>
    <text x="714" y="219" font-size="12.2" font-weight="520" fill="#b9afa2">historical tasks</text>
<text x="714" y="236" font-size="12.2" font-weight="520" fill="#b9afa2">for comparison</text>
  </g>
  <path d="M304 212 L389 212" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <path d="M611 212 L696 212" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <g>
    <rect x="260" y="340" width="480" height="116" rx="14" fill="#17130f" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="276" y1="340" x2="724" y2="340" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
    <text x="278" y="371" font-size="16" font-weight="820" fill="#f4efe7">Shadow mode</text>
    <text x="278" y="397" font-size="12.2" font-weight="520" fill="#b9afa2">run proposed behavior without changing live routing</text>
<text x="278" y="414" font-size="12.2" font-weight="520" fill="#b9afa2">measure accuracy, collisions, quality, and cost</text>
  </g>
  <path d="M500 262 L500 340" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <g>
    <rect x="260" y="546" width="480" height="92" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="276" y1="546" x2="724" y2="546" stroke="#e7b16f" stroke-width="3" stroke-linecap="round"/>
    <text x="278" y="577" font-size="16" font-weight="820" fill="#f4efe7">Promotion gate</text>
    <text x="278" y="603" font-size="12.2" font-weight="520" fill="#b9afa2">promote only with evidence and no regressions</text>
  </g>
  <path d="M500 456 L500 546" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <g>
    <rect x="80" y="546" width="124" height="92" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="96" y1="546" x2="188" y2="546" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
    <text x="98" y="577" font-size="14" font-weight="820" fill="#f4efe7">Promote</text>
    <text x="98" y="603" font-size="12.2" font-weight="520" fill="#b9afa2">version</text>
<text x="98" y="620" font-size="12.2" font-weight="520" fill="#b9afa2">update trigger</text>
  </g>
  <g>
    <rect x="796" y="546" width="124" height="92" rx="14" fill="#251d17" stroke="#4a3b2f" stroke-width="1.35"/>
    <line x1="812" y1="546" x2="904" y2="546" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
    <text x="814" y="577" font-size="14" font-weight="820" fill="#f4efe7">Archive</text>
    <text x="814" y="603" font-size="12.2" font-weight="520" fill="#b9afa2">keep report</text>
<text x="814" y="620" font-size="12.2" font-weight="520" fill="#b9afa2">for later</text>
  </g>
  <path d="M260 592 L204 592" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <path d="M740 592 L796 592" fill="none" stroke="#8f725b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  
</svg>