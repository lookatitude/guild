spec: .guild/spec/pricing-calculator.md
backend: subagent
allow_larger: false
specialists:
  - name: architect
    scope: "Design the component tree for the pricing calculator (PricingCalculator, TierSelector, SeatInput, PriceDisplay, CallToAction). Define TypeScript interfaces for PricingTier / PricingConfig. Specify the pure utility signature in lib/pricing.ts. Author an ADR for the 'client component, no SSR fetch' decision. Output: component spec + lib/pricing.ts interface + ADR."
    depends-on: []
    implied-by: "multi-component"

  - name: frontend-engineer
    scope: "Implement the pricing calculator component tree per the architect's spec. Wire real-time price computation via lib/pricing.ts. Apply Tailwind tokens. Responsive ≥ 375 px. Add PricingCalculator to the landing page below the existing tier table. Axe-core 0 critical violations. Lighthouse LCP < 2.5 s, CLS < 0.1."
    depends-on: [architect]
    implied-by: "gap-fill"  # no frontend-engineer in the 13-specialist roster; flagged to guild:create-specialist

  - name: copywriter
    scope: "Tier headlines, descriptions (≤ 60 words each), seat-count helper text, per-tier CTA labels, and the legal disclaimer. Follows the approved voice guide: confident, specific, no superlatives. Output: copy deck referencing each component slot."
    depends-on: [architect]

  - name: seo
    scope: "Research 3–5 mid-funnel pricing keywords. Update page title + meta description with primary keyword within character limits. Author FAQ JSON-LD for the top 3 pricing questions. Validate structured data. Output: keyword rationale + updated title/meta copy + JSON-LD snippet."
    depends-on: [copywriter]
